<div class="custom-fields-container">
  <h2>Benutzerdefinierte Felder</h2>

  <div style="margin-bottom: 16px;">
    <button mat-raised-button color="primary" (click)="openAddDialog()">
      <mat-icon>add</mat-icon> Feld hinzufügen
    </button>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">
    <ng-container matColumnDef="fieldName">
      <th mat-header-cell *matHeaderCellDef>Feldname</th>
      <td mat-cell *matCellDef="let row">{{ row.fieldName }}</td>
    </ng-container>
    <ng-container matColumnDef="labelDe">
      <th mat-header-cell *matHeaderCellDef>Label (DE)</th>
      <td mat-cell *matCellDef="let row">{{ row.label?.de }}</td>
    </ng-container>
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Beschreibung</th>
      <td mat-cell *matCellDef="let row">{{ row.description }}</td>
    </ng-container>
    <ng-container matColumnDef="schemaType">
      <th mat-header-cell *matHeaderCellDef>Typ</th>
      <td mat-cell *matCellDef="let row">{{ getSchemaTypeLabel(row) }}</td>
    </ng-container>
    <ng-container matColumnDef="required">
      <th mat-header-cell *matHeaderCellDef>Pflicht</th>
      <td mat-cell *matCellDef="let row">{{ row.required ? '✓' : '' }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row" [class.outdated]="isOutdated(row)">
        {{ isOutdated(row) ? 'Veraltet' : 'Aktiv' }}
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        @if (!isOutdated(row)) {
          <button mat-icon-button (click)="openEditDialog(row)" title="Bearbeiten">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="outdateField(row.id)" title="Als veraltet markieren">
            <mat-icon>delete</mat-icon>
          </button>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.outdated-row]="isOutdated(row)"></tr>
  </table>
</div>
