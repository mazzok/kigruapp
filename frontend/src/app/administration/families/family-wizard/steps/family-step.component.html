<div [formGroup]="form">
  <mat-radio-group formControlName="mode">
    <mat-radio-button value="new">Neue Familie erstellen</mat-radio-button>
    <mat-radio-button value="existing">Bestehende Familie verwenden</mat-radio-button>
  </mat-radio-group>

  @if (form.value.mode === 'existing') {
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Familie auswählen</mat-label>
      <mat-select formControlName="existingFamilyId">
        @for (family of existingFamilies; track family.id) {
          <mat-option [value]="family.id">{{ family.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  }

  @if (form.value.mode === 'new') {
    <app-custom-fields-form #customFields entityType="FAMILY"></app-custom-fields-form>
  }
</div>
