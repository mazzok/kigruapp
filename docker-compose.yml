version: "3.8"

services:
  nginx:
    build: ./infra/nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
      - keycloak
    networks:
      - kigruapp

  frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - kigruapp

  backend:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./backend/target/quarkus-app:/app
    command: java -jar quarkus-run.jar
    expose:
      - "8080"
    environment:
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://mongodb:27017
      QUARKUS_MONGODB_DATABASE: kigruapp
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8080/realms/kigruapp
      QUARKUS_OIDC_CLIENT_ID: kigruapp-api
      OIDC_CLIENT_SECRET: secret
    depends_on:
      - mongodb
      - keycloak
    networks:
      - kigruapp

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kigruapp

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    ports:
      - "8443:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/keycloak/kigruapp-realm.json:/opt/keycloak/data/import/kigruapp-realm.json
    networks:
      - kigruapp

networks:
  kigruapp:

volumes:
  mongodb_data:
